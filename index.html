<!DOCTYPE html><html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>TransportePro</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><script src="https://cdn.jsdelivr.net/npm/jspdf"></script><script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script></head>
<body><div class="app"><aside class="sidebar">
  <h2>🚍 TransportePro</h2>
  <button onclick="trocarTela('dashboard')">Dashboard</button>
  <button onclick="trocarTela('rateio')">Rateio</button>
  <button onclick="trocarTela('relatorio')">Relatórios</button>
</aside><main class="content"><!-- DASHBOARD --><section id="dashboard" class="screen active">
  <h1>Dashboard</h1>  <div class="cards">
    <div class="card"><h3>Total</h3><span id="total">R$ 0</span></div>
    <div class="card"><h3>Alunos</h3><span id="alunos">0</span></div>
    <div class="card"><h3>Veículos</h3><span id="veiculos">0</span></div>
  </div><canvas id="graficoPizza"></canvas>

</section><!-- RATEIO --><section id="rateio" class="screen">
  <h1>Novo Rateio</h1>  <div class="form">
    <input type="date" id="data">
    <input type="text" id="mes" placeholder="Mês">
    <input type="number" id="auxDinheiro" placeholder="Auxílio dinheiro">
    <input type="number" id="auxCombustivel" placeholder="Auxílio combustível">
  </div>  <div class="grid"><div class="box">
  <h2>Curvelo</h2>
  <input id="cInt" placeholder="Integrais">
  <input id="cDescQtd" placeholder="Qtd desconto">
  <input id="cDescPerc" placeholder="% desconto">
  <input id="cPass" placeholder="Passagens">
  <div id="veicC"></div>
  <button onclick="addVeiculo('c')">+ Veículo</button>
</div>

<div class="box">
  <h2>Sete Lagoas</h2>
  <input id="sInt">
  <input id="sDescQtd">
  <input id="sDescPerc">
  <input id="sPass">
  <div id="veicS"></div>
  <button onclick="addVeiculo('s')">+ Veículo</button>
</div>

  </div><button class="primary" onclick="calcular()">Calcular</button>

  <div id="resultado"></div></section><!-- RELATÓRIO --><section id="relatorio" class="screen">
  <h1>Relatório</h1>
  <button onclick="gerarPDF()">Baixar PDF Completo</button>
</section></main>
</div><script src="app.js"></script></body>
</html>
